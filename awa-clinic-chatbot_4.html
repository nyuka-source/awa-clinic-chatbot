<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あわ整形外科クリニック</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh}
#wrap{display:flex;flex-direction:column;height:100svh;max-height:780px;width:100%;max-width:480px;background:#fff;overflow:hidden;font-size:15px}
@media(min-width:480px){#wrap{border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.12);margin:16px}}
#hdr{background:#fff;border-bottom:1px solid #eee;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#hdr-left{display:flex;align-items:center;gap:9px}
.dot{width:9px;height:9px;border-radius:50%;background:#E8821A;flex-shrink:0}
#hdr-title{font-size:14px;font-weight:700;color:#1a1a1a}
#hdr-sub{font-size:11px;color:#aaa;margin-top:1px}
#lang-row{display:flex;gap:5px}
.lb{font-size:12px;padding:5px 11px;border-radius:99px;border:1px solid #ddd;background:transparent;color:#888;cursor:pointer;font-weight:500}
.lb.on{background:#E8821A;color:#fff;border-color:#E8821A}
#msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;background:#fff8f3}
.row{display:flex;gap:9px;align-items:flex-end;max-width:95%}
.row.u{align-self:flex-end;flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;background:#E8821A;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.bbl{padding:11px 14px;font-size:14px;line-height:1.75;word-break:break-word}
.row.b .bbl{background:#fff;border:1px solid #f0d9c8;border-radius:4px 16px 16px 16px;color:#1a1a1a;box-shadow:0 1px 3px rgba(232,130,26,0.08)}
.row.u .bbl{background:#E8821A;color:#fff;border-radius:16px 4px 16px 16px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cat-btn{padding:11px 10px;border-radius:12px;border:1px solid #f0d9c8;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#333;text-align:left;line-height:1.4;transition:background 0.15s}
.cat-btn:active{background:#fff0e6}
.drills{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.db{padding:11px 14px;border-radius:12px;border:1px solid #E8821A;background:#fff;cursor:pointer;font-size:13px;color:#E8821A;text-align:left;line-height:1.4;font-weight:500}
.db:active{background:#fff0e6}
#irow{padding:10px 12px;display:flex;gap:9px;border-top:1px solid #f0d9c8;flex-shrink:0;background:#fff;align-items:center}
#irow input{flex:1;font-size:15px;padding:10px 15px;border-radius:99px;border:1.5px solid #f0d9c8;outline:none;background:#fff8f3}
#irow input:focus{border-color:#E8821A;background:#fff}
#sbtn{width:42px;height:42px;border-radius:50%;background:#E8821A;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sbtn:active{background:#c06812}
#lscreen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:stretch;z-index:100;overflow:hidden;justify-content:stretch}
.ls-title{font-size:17px;font-weight:700;color:#1a1a1a;text-align:center;line-height:1.5}
.ls-sub{font-size:12px;color:#aaa;text-align:center;line-height:1.9}
.lsbtn{width:280px;padding:18px 16px;border-radius:14px;border:1px solid #eee;background:#f9f9f9;cursor:pointer;font-size:17px;font-weight:600;color:#333;text-align:center;display:flex;align-items:center;gap:10px;justify-content:center}
.lsbtn:hover{background:#fff0e6;border-color:#E8821A;color:#E8821A}
.lsbtn:active{background:#fff0e6;border-color:#E8821A;color:#E8821A}
a.cl{color:#E8821A;word-break:break-all}
</style>
</head>

    '労災用紙はどこでもらえますか？':'労災用紙は会社でご用意いただく書類です。\nまずは会社のご担当者にご相談ください。',

    '整骨院・整体との併用':'基本的には整骨院との並行での治療はお断りしております。\n\nただし近隣の当院との提携整骨院がいくつかありますので\nそこであればご紹介は可能です。\n\n整体との併用は行なっておりません。',
    '診断書・後遺症診断書':'【警察提出用の診断書】\n当院で診察を行い\n必要に応じて警察提出用の診断書を作成いたします。\n受付でその旨をお伝えください。\n\n【後遺症診断書】\n当院で診察のうえ、必要に応じて作成が可能です。\n2週間少しお時間がかかります。\n\n⚠️ 後遺症診断書の料金は\n保険会社が支払ってくれない場合があるため\n保険会社に必ずご確認ください。\n\n⚠️ 当院が提携していない整骨院からの\n診断書の記載希望はお断りしております。',

    'どんな症状でも受診できる？':'はい、どのような症状でもお気軽にご来院ください。\n万が一小児科での受診が必要な場合は、\n診察時にご案内いたします。',
    '子供が怪我をしました':'お子様がお怪我をされた場合は、\nできる限りお早めにご来院いただくことをおすすめいたします。',

    '妊娠何ヶ月から受診できますか？':'妊娠初期から妊娠終盤まで、\どの時期でもご受診いただけます。',
    'どんな症状でも妊娠中に受診できますか？':'はい、どのような症状でもご受診いただけます。\nただし、婦人科系の疾患と判断された場合は、\n主治医の先生へご紹介させていただくことがございます。',
    '妊娠中のリハビリは可能ですか？':'はい、妊娠中でもリハビリをお受けいただけます。\nただし、妊娠週数やお体の状態によって\n内容が異なる場合がございます。\n医師の診察の上で判断いたします。',
    '妊娠中にレントゲンは撮りますか？':'妊娠中はレントゲン撮影を基本的には行いません。\n必要な場合はエコーなど、\nお体への負担が少ない検査のみをご案内いたします。',
    '遠方でも受診できますか？':'はい、遠方の方もご受診いただけます。\nお気軽に一度ご来院ください。',
    '産後の診察は子供連れでも大丈夫？':'はい、お子様連れでもご安心ください。\nお気軽にご来院いただけます。',
    '産後の診察はどのようなものですか？':'産後のお体の痛みやお怪我（骨折・打撲など）、\n気になる身体の症状はすべて診察いたします。\n内科・婦人科系の疾患以外については\nお気軽に当院へご受診ください。',
    '産後のリハビリとはどんなものですか？':'産後のリハビリでは、お一人おひとりのお体の状態に合わせて\n弱った筋肉や硬くなった関節などを丁寧に診察した上で行います。\n内容は個人差がございますので、\n詳しくはリハビリ担当のスタッフにお気軽にお聞きください。',
    '産後のリハビリに子供と一緒に行けますか？':'はい、可能です。\nお子様連れの方のために半個室をご用意しております。\nどうぞお気軽にお越しください。',
    '産後の外来リハビリは予約できますか？':'はい、予約可能です。\n診察は当日のネット順番予約、\nリハビリは診察後からネット予約をお取りいただけます。',
    '産後のリハビリは保険適用ですか？':'はい、保険適用となります。\nお気軽にご来院ください。',
    '整骨院に通っていますが産後外来も受診できますか？':'はい、受診可能です。\nぜひお気軽にご来院ください。',
    '遠方でも受診できますか？':'はい、遠方の方もご受診いただけます。\nお気軽に一度ご来院ください。',
    '妊娠中の受診について':'はい。妊娠中でも診察は可能です。\n\nX線など一部検査には制限がありますので\n妊娠中であることを必ずお伝えください。',
    '産後のリハビリ':'はい。産後の腰痛・骨盤周囲の不調にも対応しております。\n\nリハビリや生活指導を含めたサポートが可能です。\nまずは診察にお越しください。',
    '産後のリハビリ（詳細）':'産後のリハビリは、患者さんごとに必要な\n弱った筋肉や硬くなった関節などを診察して行います。\n内容は個人個人で異なりますので\n詳細はリハビリの際にお聞きください。',
    'どんな症状で受診すればいいですか？':'足の痛みやお怪我など、気になる症状がございましたら\nお気軽にご受診ください。\nどのような症状でもまずはご来院いただき、\n医師がしっかりと診察いたします。',
    'どのような治療をされますか？':'まずは症状を確認し、必要な検査を行います。\nその後、患者さんのお体の状態に合わせて\n治療方針を決めていきます。\n\nリハビリテーションが適切であればリハビリを、\nインソールや装具による治療が必要であれば\n装具の作成など、\nそれぞれの状態に合わせた最適な方法をご提案いたします。',
    '遠方でも受診できますか？':'はい、遠方の方もご受診いただけます。\nお気軽に一度ご来院ください。',
    'Wi-Fiはありますか？':'誠に申し訳ございませんが\n当院ではWi-Fiのご用意はございません。',
    '松葉杖の貸し出し':'可能です。医師の診察にお入りいただき\n必要な方には松葉杖の貸し出しを行なっております。\n\nレンタル料金：1,100円（自費）\n預かり金：現金5,000円\n（松葉杖ご返却の際にお返しいたします）',
    'セカンドオピニオン':'はい。検査データや紹介状をお持ちいただくと\nより正確にご説明できます。\n\n⚠️ セカンドオピニオンの場合は\n予約と保険外となります。\n料金：30分 20,000円',
    'バリアフリー対応':'はい。車椅子や足腰に不安のある方でも\n安心してご来院いただけます。',
    '対応している症状について':'対象となる主な疾患は以下になります。\n\n外傷：骨折、打撲、捻挫、傷、火傷\n上肢：肩こり、手の痛み、五十肩、寝違え、手の痺れ、腱鞘炎、手の変形\n下肢：足の痺れ、足の痛み、肉離れ、外反母趾、扁平足、膝の痛み、股関節の痛み\n体幹：首の痛み、背中の痛み、腰痛、筋肉痛、坐骨神経痛\n代謝疾患：骨粗鬆症、痛風、関節リウマチ\n腫瘍：小さなデキモノやシコリ\n\n詳しくはHPの診療内容をご覧ください。\n🔗 https://awa-clinic.com/pg297.html',
    '薬局はありますか？':'当院は院外処方でございます。\n\n最寄りの薬局は、当院と同じフロアにございますので\nそちらをご利用ください。'
  }
},

en:{
  ph:'Type your message...',
  hi:'Hello!\nWelcome to Awa Orthopedic Clinic 😊\n\nPlease select a category below\nor type your question.',
  fb:'Thank you for your question.\nWe apologize, but this topic may be difficult to address via chat.\nPlease feel free to call us or visit the clinic.\nPlease note that we may have limited ability to assist in languages other than Japanese over the phone.\n\n📞 06-6535-9550',
  cats:['📅 Clinic Hours','📍 Access & Parking','🗓 Reservations','🧾 What to Bring','💳 Payment','🏃 Rehabilitation','🚗 Traffic & Work Injuries','🌏 Foreign Patients','👶 Children & Pregnancy','🏥 Other Questions'],
  catData:{
    '📅 Clinic Hours':{a:'[Clinic Hours]\n\nMon / Tue / Wed / Fri\n　9:00 AM – 12:00 PM\n　3:30 PM – 6:30 PM\n\nThursday\n　9:00 AM – 12:00 PM (afternoon closed)\n\nSaturday\n　9:00 AM – 1:00 PM (afternoon closed)\n　Open on 1st, 3rd, and 5th Saturdays only\n\nClosed: 2nd & 4th Saturdays,\nSundays, and public holidays\n\nThe clinic may be closed during\nyear-end/New Year and Obon holidays.\nPlease check our website for details.',d:['Afternoon hours','2nd & 4th Saturdays','Year-end & Obon closures']},
    '📍 Access & Parking':{a:'[Access]\n2F, OASIS Clinic Mall\n4-6-23 Shimmachi, Nishi-ku, Osaka\n550-0013, Japan\n📞 +81-6-6535-9550\n\n🚇 Osaka Metro Nishi-Nagahori Station\n　Exit 4A — 1-minute walk\n\n[Parking]\nPlease use "Times Hankyu Oasis Shimmachi"\non the rooftop (3rd floor) of the building.\n\n✅ Up to 120 minutes FREE\nRequest a parking QR code at reception\nwhen paying.',d:['How to use the parking QR code']},
    '🗓 Reservations':{a:'[Reservations]\nConsultations can only be reserved online.\nWe cannot accept reservations by phone.\n\nPlease note: you cannot select a specific\ntime for your reservation.\n\n🔗 Web Reservation\nhttps://ssc8.doctorqube.com/awa-clinic/\n\nIf online reservation is difficult,\nyou may walk in without a reservation.\nA number will be issued at reception.',d:['Walk-in wait times','When to arrive after booking','Can I book for tomorrow?']},
    '🧾 What to Bring':{a:'[What to Bring]\n\nVisitors from abroad:\nPlease bring your passport.\n\nResidents in Japan:\nPlease bring your health insurance card.\n\nOther items (if applicable):\n・Clinic card (repeat visits)\n・Medical welfare certificate\n・Medication booklet or current medications\n・Referral letter from another hospital',d:['Consultation fees','Medical certificates','Visiting without insurance']},
    '💳 Payment':{a:'[Payment Methods]\n\n✅ Cash\n✅ Credit cards\n　(most major cards accepted)\n\n❌ Mobile payments not available\n\nNote: some cards may not be accepted\ndepending on the card company.',d:['Overseas travel insurance']},
    '🏃 Rehabilitation':{a:'[Rehabilitation]\n\nRehabilitation is by appointment.\nThe doctor will assess your condition\nduring consultation before directing\nyou to rehab.\n\nPlease visit for a consultation first.\n\nOnline booking for rehab is available\nafter your first rehab session\nfollowing a doctor\'s instruction.\n\n🔗 https://awa-clinic.com/howtoreservation.html',d:['How to cancel rehab','Continuing rehab from another clinic']},
    '🚗 Traffic & Work Injuries':{a:'[Traffic Accidents & Work Injuries]\n\nBoth are accepted.\n\nWe treat all applicable symptoms\nand refer to specialists if needed.\n\nFor traffic accidents:\n→ Inform your insurance company\n　that you will visit our clinic.\n\nFor work injuries:\n→ Bring the company-issued\n　workers\' compensation documents.\n\n🔗 https://awa-clinic.com/pg617.html',d:['Medical & disability certificates','Other party\'s insurance won\'t pay','Rehab for traffic accidents']},
    '🌏 Foreign Patients':{a:'[For Foreign Patients]\n\nWe support patients from overseas.\n\n・Dr. Awa can consult in English.\n・Other doctors use translation devices.\n・Reception staff use translation tools.\n・English medical questionnaire available.\n\nVisitors from abroad may consult\nwith their passport.',d:['Medical certificate in English','Overseas travel insurance','Visiting without insurance']},
    '👶 Children & Pregnancy':{a:'[Children, Pregnancy & Postnatal]\n\nWe treat all children from\ninfants to high school students.\nFeel free to consult us about minor\nconcerns or sports-related injuries.\n\nConsultations are available\nduring pregnancy.\nPlease inform us if you are pregnant,\nas some tests (e.g. X-rays) may\nbe restricted.',d:['Consultation while pregnant','Sports injuries & sprains']},
    '🏥 Other Questions':{a:'Here are some frequently asked questions.\nPlease select below.',d:['Is Wi-Fi available?','Wheelchair accessibility','What symptoms do you treat?','Is there a pharmacy nearby?','Can I get medication without a consultation?','MRI / CT scans']}
  },
  drill:{
    'Afternoon hours':'Afternoon hours (3:30–6:30 PM) are\navailable Mon / Tue / Wed / Fri only.\n\nThursday and Saturday:\nmorning hours only.',
    '2nd & 4th Saturdays':'Closed on 2nd and 4th Saturdays.\n\n1st, 3rd, and 5th Saturdays:\nopen 9:00 AM – 1:00 PM.',
    'Year-end & Obon closures':'The clinic may be closed during\nyear-end/New Year and Obon holidays.\n\nPlease check our website or call us.\n📞 +81-6-6535-9550',
    'How to use the parking QR code':'Please request it at reception\nwhen paying.\n\nA paper with a QR code will be issued.\n\nScan it at the Times parking machine\nfor up to 120 minutes free.',
    'Walk-in wait times':'Walk-in patients are seen between\nreserved patients, so wait times vary\ndepending on the day.\n\nWe recommend arriving right at opening:\n9:00 AM or 3:30 PM\nfor a smoother experience.',
    'When to arrive after booking':'When you reserve online, a number\nis issued. You may visit at any time\nduring clinic hours.\n\nIf you registered an email address,\nyou will receive a notification\nwhen your number is approaching.\n\nThe current waiting number is shown\non the online reservation page.\n\n⚠️ Reception closes at end of\nclinic hours — please arrive in time.',
    'Can I book for tomorrow?':'Reservations are only available\non the day of your visit, online only.\n\n🔗 https://ssc8.doctorqube.com/awa-clinic/',
    'Consultation fees':'If you do not have Japanese health\ninsurance, the cost is approximately\n¥25,000 – ¥60,000 depending on\nthe type of treatment.\n\nWe will provide a receipt which you\ncan submit to your travel insurance\ncompany as proof of payment.',
    'Medical certificates':'Certificates issued by our clinic\ncan be provided the same day.\n\nFor your own forms, processing time\nand fees may vary.\nPlease ask reception staff.',
    'Visiting without insurance':'Visitors from abroad may consult\nwith their passport.\n\nResidents in Japan: private treatment\nwithout insurance is not available.\n\nIf you temporarily do not have\nyour insurance card, you may leave\na deposit and present the card later\nto adjust the payment.',
    'Overseas travel insurance':'We do not directly settle with\noverseas insurance companies.\n\nIf your insurer has a Japan office,\nthey may contact us directly.\n\nOtherwise, please pay upfront and\nclaim reimbursement from your\ninsurer afterward.',
    'How to cancel rehab':'You can cancel online until\n6:30 PM the day before.\n\nSame-day cancellations must\nbe made by phone.\n📞 +81-6-6535-9550\n\n⚠️ Repeated no-shows may result\nin refusal of service.',
    'Continuing rehab from another clinic':'Yes, this is possible.\nPlease bring any referral letters\nor previous treatment records.\n\n⚠️ You cannot receive rehab at\ntwo clinics in the same month.',
    'Medical & disability certificates':'We can prepare various certificates\nafter consultation.\n\nFor police report certificates:\n→ Please inform reception.\n\nFor disability certificates:\n→ Approx. 2 weeks processing time.\n→ Check with your insurer about\n　fee coverage in advance.',
    'Other party\'s insurance won\'t pay':'Even if the other party\'s insurance\ncannot be used, treatment is still\npossible using compulsory auto\ninsurance or your own health insurance.\n\nPlease visit and we will advise you.',
    'Rehab for traffic accidents':'Yes. We provide rehabilitation for\nwhiplash and muscle/joint issues\ncaused by traffic accidents.\n\nPlease feel free to consult us.',
    'Medical certificate in English':'Yes, English medical certificates\nare available.\n\nPlease inform staff or the doctor\nif you need one.',
    'Consultation while pregnant':'Yes. Consultations are available\nduring pregnancy.\n\nPlease be sure to inform us\nif you are pregnant, as some tests\n(such as X-rays) may be restricted.',
    'Sports injuries & sprains':'Yes. We treat sports injuries\nincluding sprains and muscle strains,\nand provide rehabilitation support.',
    'Is Wi-Fi available?':'We are sorry, but Wi-Fi is not\navailable at our clinic.',
    'Wheelchair accessibility':'Yes. Our clinic is barrier-free.\nPatients using wheelchairs or those\nwith mobility concerns can visit\nwith confidence.',
    'What symptoms do you treat?':'Main conditions we treat:\n\nInjuries: fractures, bruises, sprains,\n　cuts, burns\nUpper limbs: shoulder/hand pain,\n　frozen shoulder, stiff neck,\n　numbness, tendonitis\nLower limbs: leg pain/numbness,\n　muscle strain, bunions, knee pain,\n　hip pain\nTrunk: neck/back/lower back pain,\n　sciatica\nMetabolic: osteoporosis, gout,\n　rheumatoid arthritis\nTumors: small lumps or bumps\n\n🔗 https://awa-clinic.com/pg297.html',
    'Is there a pharmacy nearby?':'We provide external prescriptions.\n\nThe nearest pharmacy is located\non the same floor as our clinic.',
    'Can I get medication without a consultation?':'It is not possible to receive\nmedication without a consultation.\nA doctor\'s visit is required by law.',
    'MRI / CT scans':'We will arrange MRI or CT scans\nat one of our partner hospitals,\nincluding making the appointment.\n\nThe results will be explained\nat our clinic.\n\nIf necessary, we may also refer you\nto other nearby hospitals.'
  }
},

zh:{
  ph:'请输入您的消息...',
  hi:'您好！\n欢迎来到阿波骨科诊所 😊\n\n请从下方选择类别，\n或直接输入您的问题。',
  fb:'感谢您的提问。\n非常抱歉，此内容可能难以通过聊天进行解答。\n请致电或直接来院，我们将为您详细说明。\n※请注意，电话对应可能仅限日语，敬请谅解。\n\n📞 06-6535-9550',
  cats:['📅 诊疗时间','📍 交通与停车','🗓 预约与就诊','🧾 携带物品','💳 支付方式','🏃 康复治疗','🚗 交通事故・工伤','🌏 外国患者','👶 儿童・妊娠・产后','🏥 其他问题'],
  catData:{
    '📅 诊疗时间':{a:'【诊疗时间】\n\n周一、周二、周三、周五\n　上午 9:00～12:00\n　下午 15:30～18:30\n\n周四\n　上午 9:00～12:00（下午休诊）\n\n周六\n　上午 9:00～13:00（下午休诊）\n　※仅第1・3・5周周六开诊\n\n休诊日：第2・4周周六、周日、法定节假日\n\n年末年初、盂兰盆节等期间有例行休诊。\n详情请确认官网的门诊负责医生一览表。',d:['下午诊疗的日期？','第2・4周周六的详情','年末年初・盂兰盆节休诊']},
    '📍 交通与停车':{a:'【交通方式】\n〒550-0013\n大阪府大阪市西区新町4-6-23\nOASIS诊所商城2楼\n📞 06-6535-9550\n\n🚇 大阪地铁 西长堀站\n　4A出口 步行1分钟\n\n【停车场】\n请使用同一栋大楼三楼的\n「Times阪急Oasis新町店」停车场。\n\n✅ 最长120分钟免费\n结账时请向工作人员索取\n印有停车服务二维码的凭证。',d:['如何使用停车二维码']},
    '🗓 预约与就诊':{a:'【预约方式】\n本院诊察仅限网络顺序预约。\n由于系统原因，电话预约无法受理，敬请谅解。\n\n请注意，本预约并非指定时间的预约。\n\n🔗 网页预约\nhttps://ssc8.doctorqube.com/awa-clinic/\n\n对于不便进行网络预约的患者\n可以直接来院，前台会为您发放号码。',d:['没有预约等待时间多久？','预约后何时来院？','可以预约明天吗？']},
    '🧾 携带物品':{a:'【就诊携带物品】\n\n旅行中的外国患者：请携带护照。\n居住在日本的患者：请携带健康保险证。\n\n其他（如有）：\n・诊察券（复诊患者）\n・各种公费医疗受给者证\n・药物手册或正在服用的药物\n・他院介绍信',d:['诊察费用','诊断书','没有保险证可以就诊吗？']},
    '💳 支付方式':{a:'【支付方式】\n\n仅限现金或信用卡。\n所有常见的信用卡均可使用。\n\n但因信用卡公司原因\n有时可能无法使用。\n\n❌ 不支持手机支付',d:['海外旅行保险可以使用吗？']},
    '🏃 康复治疗':{a:'【康复治疗】\n\n本院康复治疗实行预约制。\n首先需由医生诊察，确认身体状况后\n再安排康复治疗。\n\n希望康复治疗的患者，请先来院接受诊察。\n\n接受医生诊察并获得康复指示的患者\n可在首次康复结束后进行网络预约。\n\n🔗 https://awa-clinic.com/howtoreservation.html',d:['如何取消康复预约','从其他医院继续康复治疗']},
    '🚗 交通事故・工伤':{a:'【交通事故・工伤】\n\n均可受理，请放心来院。\n\n不仅交通事故，本院可诊治所有适用的症状。\n若属专业外科领域，将介绍至合适的专科医生。\n\n交通事故患者\n→ 请事先告知您的保险公司\n　您将在本院就诊，以便手续顺利。\n\n工伤患者\n→ 请携带公司提供的工伤表格\n　以便手续顺利办理。\n\n🔗 https://awa-clinic.com/pg617.html',d:['诊断书・后遗症诊断书','对方保险无法使用时','交通事故的康复治疗']},
    '🌏 外国患者':{a:'【外国患者支持】\n\n为使外国患者也能安心就诊\n本院提供以下支持：\n\n・院长阿波医生可进行英语诊察\n・代诊医生使用翻译机进行诊察\n・前台工作人员使用翻译工具提供帮助\n・提供英文版的问诊表\n\n旅行中的外国患者可凭护照就诊。',d:['可以开具英文诊断书吗？','海外旅行保险','没有保险证可以就诊吗？']},
    '👶 儿童・妊娠・产后':{a:'【儿童・妊娠・产后】\n\n本院可为婴儿到高中生的\n所有儿童提供诊察与治疗。\n无论是日常的小问题还是运动相关损伤\n都可随时咨询。\n\n孕期也能接受诊疗。\n但请务必告知我们您正在怀孕\n因为部分检查（如X光）会受到限制。\n\n产后腰痛・骨盆周围不适也可对应。\n可提供康复及生活指导支持。',d:['儿童肘部受伤','怀孕期间就诊注意事项','产后康复']},
    '🏥 其他问题':{a:'以下是常见问题。\n请从下方选择。',d:['可以使用Wi-Fi吗？','无障碍设施','本院可诊疗哪些症状？','附近有药店吗？','不就诊能直接拿药吗？','MRI・CT检查']}
  },
  drill:{
    '下午诊疗的日期？':'下午诊疗（15:30～18:30）\n仅限周一、周二、周三、周五。\n\n周四和周六仅上午诊疗。',
    '第2・4周周六的详情':'第2・4周周六休诊。\n\n第1・3・5周周六\n上午9:00～13:00开诊。',
    '年末年初・盂兰盆节休诊':'年末年初、盂兰盆节等期间有例行休诊。\n\n详情请确认官网或致电咨询。\n📞 06-6535-9550',
    '如何使用停车二维码':'结账时请向前台工作人员索取。\n\n工作人员会发给您\n印有二维码的凭证。\n\n在Times停车场的机器上\n扫描二维码即可享受最长120分钟免费。',
    '没有预约等待时间多久？':'无预约患者将在预约患者的间隙就诊\n等待时间因当天预约情况和院内拥挤程度而异。\n\n但在上午9:00・下午15:30\n开诊时段，无预约患者也相对较容易就诊。\n时间充裕的患者建议在该时间段前来。',
    '预约后何时来院？':'网络预约后会发放一个号码。\n在诊疗时间内，您可以选择任意时间来院。\n\n若在预约时登记了邮箱\n当您的号码快到时，我们会发送提醒邮件。\n\n网页预约页面可查看当前院内等候的号码\n可作为来院参考。\n\n⚠️ 诊疗时间结束后将无法办理挂号，请注意。',
    '可以预约明天吗？':'预约仅限就诊当天，且只能通过网络进行。\n请在就诊当天预约。\n\n🔗 https://ssc8.doctorqube.com/awa-clinic/',
    '诊察费用':'诊察费用因检查内容和投药情况而异\n具体金额将在诊察后告知。\n\n非常抱歉，无法事先提供费用估算。',
    '诊断书':'本院出具的诊断书可当日领取。\n\n若需医生在您提供的表格上填写\n所需时间与费用将视表格内容而定\n请向前台咨询。',
    '没有保险证可以就诊吗？':'外国旅行者：可凭护照就诊。\n\n居住在日本的患者：\n本院不提供无保险证的自费诊疗。\n\n※保险证切换期间等暂时没有保险证的患者\n可缴纳押金后就诊。\n就诊后出示保险证\n我们会退还差额。',
    '海外旅行保险可以使用吗？':'本院不与海外保险公司直接结算或处理文件。\n\n仅当由在日本设有窗口的\n旅行保险公司（或代理商）联系时\n方可使用保险结算。\n\n除此情况，需患者先自费支付\n再自行向保险公司申请报销。',
    '如何取消康复预约':'前一天18:30前可通过网页或电话取消。\n\n当天取消请务必电话联系。\n\n📞 06-6535-9550\n\n⚠️ 若多次无故缺席，可能会被拒绝接受康复。',
    '从其他医院继续康复治疗':'可以。请携带介绍信或既往治疗记录。\n\n⚠️ 同月内不可在两家医院同时接受康复治疗。',
    '诊断书・后遗症诊断书':'【警察提交用诊断书】\n在本院就诊后，如有需要\n可出具警察提交用诊断书。\n请在前台告知工作人员。\n\n【后遗症诊断书】\n在本院就诊后，如有需要可出具。\n大约需要2周时间。\n\n⚠️ 后遗症诊断书的费用有时保险公司不承担\n请务必事先向保险公司确认。',
    '对方保险无法使用时':'即使对方保险无法使用\n也可使用强制汽车保险\n或您自己的健康保险进行诊疗。\n\n请来院就诊，我们会为您详细说明。',
    '交通事故的康复治疗':'可以。本院可为交通事故导致的\n颈椎扭伤及关节・肌肉不适\n提供康复治疗。\n\n欢迎随时咨询。',
    '可以开具英文诊断书吗？':'可以。本院可出具英文诊断书。\n\n如有需要，请告知工作人员或医生。',
    '海外旅行保险':'本院不与海外保险公司直接结算。\n\n需患者先自费支付\n再自行向保险公司申请报销。',
    '儿童肘部受伤':'可以就诊。婴幼儿及儿童常见的\n肘内障（手臂脱臼）等情况\n请尽快来院。\n\n🔗 https://awa-clinic.com/pg584.html',
    '怀孕期间就诊注意事项':'可以。孕期也能接受诊疗。\n\n但请务必告知我们您正在怀孕\n因为部分检查（如X光）会受到限制。',
    '产后康复':'可以。产后腰痛・骨盆周围不适\n均可对应。\n\n可提供康复及生活指导支持。\n请先来院接受诊察。',
    '可以使用Wi-Fi吗？':'非常抱歉，本院不提供Wi-Fi。',
    '无障碍设施':'是的。本院已全面无障碍化。\n使用轮椅或对腿脚不便的患者\n也可以安心就诊。',
    '本院可诊疗哪些症状？':'主要适用的疾病如下：\n\n外伤：骨折、挫伤、扭伤、伤口、烧伤\n上肢：肩颈酸痛、手部疼痛、五十肩、落枕、手部麻木、腱鞘炎、手部畸形\n下肢：脚部麻木、脚痛、肌肉拉伤、拇外翻、扁平足、膝痛、髋关节痛\n躯干：颈痛、背痛、腰痛、肌肉痛、坐骨神经痛\n代谢性疾病：骨质疏松、痛风、类风湿性关节炎\n肿瘤：小肿块或硬结\n\n🔗 https://awa-clinic.com/pg297.html',
    '附近有药店吗？':'本院实行院外处方。\n\n最近的药店就在本院同一楼层。',
    '不就诊能直接拿药吗？':'根据法律规定，禁止无诊察给药。\n必须经过医生诊察。',
    'MRI・CT检查':'我们会为您预约合作医院的MRI或CT检查\n并在本院为您解释检查结果。\n\n必要时，也会为您介绍附近的医院。'
  }
}
};

  document.getElementById('hdr-title').textContent=titles[l]||titles.ja;
  document.getElementById('inp').placeholder=D[l].ph;
  document.getElementById('msgs').innerHTML='';
  botMsg(D[l].hi,D[l].cats,'cat');
}

function userMsg(text){
  const m=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className='row u';
  row.innerHTML=`<div class="bbl">${text}</div>`;
  m.appendChild(row);
  m.scrollTop=m.scrollHeight;
}
let currentCat=null;
let currentDrills=null;
let currentDrillLabel=null;

function selCat(cat){
  userMsg(cat);
  const data=D[lang].catData[cat];
  if(data){
    currentCat=cat;
    currentDrills=data.d;
    currentDrillLabel=cat.replace(/^[^\s]+\s/,''); // 絵文字を除いたカテゴリ名
    setTimeout(()=>botMsg(data.a,data.d,'drill'),250);
  } else {
    setTimeout(()=>botMsg(D[lang].fb,null,null),250);
  }
}

function doDrill(key){
  // カテゴリ一覧に戻るボタンの処理
  if(key==='📋 カテゴリ一覧に戻る'||key==='📋 Back to category list'||key==='📋 返回分类列表'){
    userMsg(key);
    const more={ja:'カテゴリをお選びください。',en:'Please select a category.',zh:'请选择一个类别。'};
    setTimeout(()=>botMsg(more[lang]||more.ja, D[lang].cats, 'cat'),250);
    return;
  }
  userMsg(key);
  const ans=D[lang].drill[key];
  setTimeout(()=>{
    if(ans && typeof ans === 'object' && ans.a){
      currentDrills=ans.d;
      currentDrillLabel=key.replace(/^\d+\.\s/,''); // 「1. 」などを除去
      botMsg(ans.a, ans.d, 'drill');
    } else {
      botMsg(ans||D[lang].fb, null, null);
      setTimeout(()=>{
        if(currentDrills && currentDrills.length){
          const more={
            ja:`「${currentDrillLabel}」について、他にご質問はございますか？`,
            en:`Do you have any other questions about "${currentDrillLabel}"?`,
            zh:`关于「${currentDrillLabel}」，您还有其他问题吗？`
          };
          const backBtn={
            ja:'📋 カテゴリ一覧に戻る',
            en:'📋 Back to category list',
            zh:'📋 返回分类列表'
          };
          botMsg(more[lang]||more.ja, [...currentDrills, backBtn[lang]||backBtn.ja], 'drill');
        } else {
          const more={ja:'他にご質問はありますか？',en:'Is there anything else I can help you with?',zh:'还有其他问题吗？'};
          botMsg(more[lang]||'Any other questions?', D[lang].cats, 'cat');
        }
      },600);
    }
  },250);
}
const GAS_URL='https://script.google.com/macros/s/AKfycbyLOPOmcx7EdPZ706pdRItPtaQ2QY9vfcoEI3tiYDNNVXPP8oPkVHz8YoAeS6gBpw_z/exec';

function logToSheet(message){
  const form=new FormData();
  form.append('lang',lang);
  form.append('message',message);
  fetch(GAS_URL,{
    method:'POST',
    body:JSON.stringify({lang:lang,message:message}),
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'}
  }).catch(()=>{});
}

function send(){
  const i=document.getElementById('inp');
  const t=i.value.trim();if(!t)return;
  i.value='';userMsg(t);
  logToSheet(t);
  setTimeout(()=>botMsg(D[lang].fb,null,null),280);
}
